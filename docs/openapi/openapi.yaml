openapi: 3.0.3
info:
  title: Receipt AI App API
  description: |
    OpenAPI 正本（全公開 API）。
    Phase 1: auth / receipt / stats — Phase 2 (#98-8-10): category / productMaster / admin / upload / health。
    詳細な as-built 仕様は docs/design/api-spec.md を参照。
  version: 1.1.0

servers:
  - url: /api
    description: Express app（baseURL = EXPO_PUBLIC_API_URL、通常 `/api` 付き）
  - url: /
    description: ルート（/health のみ。/api プレフィックスなし）

tags:
  - name: auth
  - name: receipt
  - name: stats
  - name: category
  - name: productMaster
  - name: admin
  - name: upload
  - name: health

paths:
  /auth/resolve-family:
    post:
      tags: [auth]
      summary: 招待コードから世帯を解決
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveFamilyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ResolvedFamily'

  /auth/families/{familyGroupId}/members:
    get:
      tags: [auth]
      summary: ログイン前メンバー一覧
      parameters:
        - name: familyGroupId
          in: path
          required: true
          schema:
            type: integer
        - name: inviteCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuthFamilyMember'

  /auth/login:
    post:
      tags: [auth]
      summary: パスワード認証
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /auth/totp/setup:
    post:
      tags: [auth]
      summary: TOTP シークレット発行
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TotpSetupInfo'

  /auth/totp/confirm:
    post:
      tags: [auth]
      summary: TOTP 有効化
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpCodeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /auth/verify-totp:
    post:
      tags: [auth]
      summary: ログイン時 TOTP 検証
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpCodeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /auth/totp/disable:
    post:
      tags: [auth]
      summary: TOTP 無効化
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpDisableRequest'
      responses:
        '200':
          description: OK

  /receipts:
    get:
      tags: [receipt]
      summary: レシート一覧
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
        - name: memberId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ReceiptDetail'
    post:
      tags: [receipt]
      summary: 手動レシート登録
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualReceiptRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReceiptDetail'

  /receipts/latest:
    get:
      tags: [receipt]
      summary: 最新レシート 1 件
      security:
        - bearerAuth: []
      parameters:
        - name: memberId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: '#/components/schemas/ReceiptDetail'
                          - type: 'null'

  /receipts/{id}:
    patch:
      tags: [receipt]
      summary: レシート全体編集
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReceiptRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReceiptDetail'
    delete:
      tags: [receipt]
      summary: レシート削除
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageEnvelope'

  /receipts/commit:
    post:
      tags: [receipt]
      summary: AI 解析結果の確定保存
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitReceiptRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReceiptDetail'
        '409':
          description: 重複レシート
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateReceiptError'

  /receipts/upload:
    post:
      tags: [receipt]
      summary: 画像アップロード → 解析ジョブ投入
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image, memberId]
              properties:
                image:
                  type: string
                  format: binary
                memberId:
                  type: integer
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UploadJobResponse'

  /receipts/jobs:
    get:
      tags: [receipt]
      summary: 解析ジョブ一覧
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ReceiptJobListItem'

  /receipts/jobs/{jobId}:
    delete:
      tags: [receipt]
      summary: 未取り込みジョブ破棄
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageEnvelope'

  /receipts/status/{jobId}:
    get:
      tags: [receipt]
      summary: 解析ジョブ状態
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReceiptJobStatus'

  /receipts/items/{itemId}:
    patch:
      tags: [receipt]
      summary: 明細カテゴリ更新
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemCategoryRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReceiptItemDetail'

  /receipts/items/{itemId}/splits:
    post:
      tags: [receipt]
      summary: 明細按分保存
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveItemSplitsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - type: array
                            items:
                              $ref: '#/components/schemas/ItemSplitSummary'
                          - type: object
                            properties:
                              message:
                                type: string

  /family-groups/members:
    get:
      tags: [receipt]
      summary: 認証済み世帯メンバー一覧
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FamilyMemberSummary'

  /stats/monthly:
    get:
      tags: [stats]
      summary: 月別家計統計
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MonthlyStatsData'

  /stats/advanced:
    get:
      tags: [stats]
      summary: トレンド・パレート分析
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdvancedStatsData'

  /stats/settlement:
    get:
      tags: [stats]
      summary: 月間精算ステータス
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SettlementStatusData'

  /stats/settlement/transfers:
    post:
      tags: [stats]
      summary: 送金履歴追加
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSettlementTransferRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SettlementTransfer'

  /stats/settlement/transfers/{id}:
    delete:
      tags: [stats]
      summary: 送金履歴削除
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: integer

  /categories:
    get:
      tags: [category]
      summary: カテゴリ一覧
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'
    post:
      tags: [category]
      summary: カテゴリ新規作成
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Category'

  /categories/{id}:
    delete:
      tags: [category]
      summary: カテゴリ削除
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageEnvelope'

  /categories/optimize:
    post:
      tags: [category]
      summary: ProductMaster からキーワード最適化
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OptimizeCategoryResponse'

  /product-master:
    get:
      tags: [productMaster]
      summary: 学習マスタ一覧
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: store
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductMaster'

  /product-master/{id}:
    patch:
      tags: [productMaster]
      summary: マスタ個別更新
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductMasterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductMaster'
    delete:
      tags: [productMaster]
      summary: マスタ削除
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageEnvelope'

  /product-master/merge-stores:
    post:
      tags: [productMaster]
      summary: 店舗名統合
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeStoreNamesRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MergeStoreNamesResponse'

  /uploads/{filename}:
    get:
      tags: [upload]
      summary: レシート画像配信（認証付き）
      security:
        - bearerAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 画像バイナリ
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found

  /admin/stats:
    get:
      tags: [admin]
      summary: AI コスト統計
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AdminCostStatRow'

  /admin/prompts:
    get:
      tags: [admin]
      summary: プロンプトテンプレート一覧
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PromptTemplate'
    post:
      tags: [admin]
      summary: プロンプト新規作成
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PromptTemplate'

  /admin/prompts/{id}:
    patch:
      tags: [admin]
      summary: プロンプト更新
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromptTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PromptTemplate'
    delete:
      tags: [admin]
      summary: プロンプト削除
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageEnvelope'

  /admin/prompts/{id}/activate:
    patch:
      tags: [admin]
      summary: デフォルトプロンプト切替
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageEnvelope'

  /health:
    get:
      tags: [health]
      summary: 死活監視
      servers:
        - url: /
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data: {}

    ApiMessageEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string

    ResolveFamilyRequest:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    ResolvedFamily:
      type: object
      required: [familyGroupId, name]
      properties:
        familyGroupId:
          type: integer
        name:
          type: string

    AuthFamilyMember:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    LoginRequest:
      type: object
      required: [familyGroupId, memberId, password]
      properties:
        familyGroupId:
          type: integer
        memberId:
          type: integer
        password:
          type: string

    LoginMember:
      type: object
      required: [id, name, familyGroupId, role]
      properties:
        id:
          type: integer
        name:
          type: string
        familyGroupId:
          type: integer
        role:
          type: string
        totpEnabled:
          type: boolean

    LoginResponse:
      type: object
      required: [token, pendingToken, member, requiresTotpVerification, requiresTotpSetup]
      properties:
        token:
          type: string
          nullable: true
        pendingToken:
          type: string
          nullable: true
        member:
          $ref: '#/components/schemas/LoginMember'
        requiresTotpVerification:
          type: boolean

name: T320 CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, linux, t320]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync to Stable directory
        run: |
          mkdir -p ~/stable/receipt-ai-app
          # ★修正: 永続化データ(pgdata, redisdata, uploads)を同期(削除)対象から除外
          rsync -av --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'pgdata' \
            --exclude 'redisdata' \
            --exclude 'uploads' \
            ./ ~/stable/receipt-ai-app/

      - name: Create Stable .env
        run: |
          cd ~/stable/receipt-ai-app
          # 1. 共通の.env生成
          echo "UID=$(id -u)" > .env
          echo "GID=$(id -g)" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "COMPOSE_PROJECT_NAME=receipt-stable" >> .env
          echo "BACKEND_PORT=${{ secrets.STABLE_BACKEND_PORT }}" >> .env
          echo "FRONTEND_PORT=${{ secrets.STABLE_FRONTEND_PORT }}" >> .env
          echo "EXPO_PORT_1=${{ secrets.STABLE_EXPO_PORT_1 }}" >> .env
          echo "EXPO_PORT_2=${{ secrets.STABLE_EXPO_PORT_2 }}" >> .env
          echo "DB_PORT=${{ secrets.STABLE_DB_PORT }}" >> .env
          echo "REDIS_PORT=${{ secrets.STABLE_REDIS_PORT }}" >> .env
          echo "T320_IP=192.168.1.32" >> .env
          
          # Expo / CORS 用
          echo "EXPO_PACKAGER_PROXY_URL=http://192.168.1.32:8082" >> .env
          echo "EXPO_PUBLIC_API_URL=http://192.168.1.32:${{ secrets.STABLE_BACKEND_PORT }}" >> .env
          echo "ALLOWED_ORIGINS=http://192.168.1.32:8082,http://localhost:8082" >> .env

          # 実行用シークレット
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NODE_ENV=production" >> .env

          # 2. 各サービスへ展開
          cp .env ./frontend/.env
          cp .env ./backend/.env

          # 3. バックエンド用の設定をコンテナ内部通信用に最適化
          echo "DATABASE_URL=postgresql://cntadm:${{ secrets.DB_PASSWORD }}@db:5432/receipt_db?schema=public" >> ./backend/.env
          echo "REDIS_HOST=redis" >> ./backend/.env
          sed -i 's/^REDIS_PORT=.*/REDIS_PORT=6379/' ./backend/.env

      - name: Install dependencies
        run: |
          cd ~/stable/receipt-ai-app/backend
          npm install
          cd ../frontend
          npm install

      - name: Docker Deploy
        run: |
          cd ~/stable/receipt-ai-app
          docker compose up -d --build

      - name: Prisma Migrate (Stable DB)
        run: |
          cd ~/stable/receipt-ai-app
          # コンテナ内でマイグレーションを実行
          docker compose exec -T backend npx prisma migrate deploy
          
      - name: Cleanup
        run: docker image prune -f
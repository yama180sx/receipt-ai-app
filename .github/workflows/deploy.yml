name: T320 CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, linux, t320]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync to Stable directory
        run: |
          mkdir -p ~/stable/receipt-ai-app
          rsync -av --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'pgdata' \
            --exclude 'redisdata' \
            --exclude 'uploads' \
            ./ ~/stable/receipt-ai-app/

      - name: Create Stable .env
        run: |
          cd ~/stable/receipt-ai-app
          
          # 1. ルート .env 生成
          cat <<EOF > .env
          ENV_NAME=stable
          COMPOSE_PROJECT_NAME=receipt-stable
          UID=$(id -u)
          GID=$(id -g)
          HOST_IP=${{ secrets.HOST_IP }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_USER=cntadm
          DB_NAME=receipt_db
          WEB_PORT=${{ secrets.STABLE_WEB_PORT }}
          BACKEND_PORT=${{ secrets.STABLE_BACKEND_PORT }}
          DEV_PORT=${{ secrets.STABLE_DEV_PORT }}
          DB_PORT=${{ secrets.STABLE_DB_PORT }}
          REDIS_PORT=${{ secrets.STABLE_REDIS_PORT }}
          EXPO_PORT_1=19002
          EXPO_PORT_2=19003
          BACKEND_COMMAND="npm run start"
          NODE_ENV=production
          EOF

          # 2. 各サービスへ共通設定を展開
          cp .env ./frontend/.env
          cp .env ./backend/.env

          # 3. backend/.env 固有設定
          cat <<EOF >> ./backend/.env
          PORT=3000
          DATABASE_URL="postgresql://cntadm:${{ secrets.DB_PASSWORD }}@db:5432/receipt_db?schema=public"
          REDIS_HOST=redis
          REDIS_PORT_INTERNAL=6379
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN="30d"
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL="gemini-flash-latest"
          GEMINI_RETRY_COUNT=3
          GEMINI_RETRY_DELAY=2000
          CORS_ORIGIN="http://${{ secrets.HOST_IP }}:${{ secrets.STABLE_WEB_PORT }}"
          LOG_LEVEL=info
          EOF

          # 4. frontend/.env 固有設定
          echo "EXPO_PUBLIC_API_URL=http://${{ secrets.HOST_IP }}:${{ secrets.STABLE_BACKEND_PORT }}/api" >> ./frontend/.env
          echo "EXPO_PUBLIC_API_TOKEN=${{ secrets.EXPO_PUBLIC_API_TOKEN }}" >> ./frontend/.env

      - name: Install dependencies
        run: |
          cd ~/stable/receipt-ai-app/backend && npm install
          cd ../frontend && npm install

      - name: Docker Deploy
        run: |
          cd ~/stable/receipt-ai-app
          docker compose up -d --build --remove-orphans

      - name: Prisma Migrate (Stable DB)
        run: |
          cd ~/stable/receipt-ai-app
          docker compose exec -T backend npx prisma migrate deploy
          
      - name: Cleanup
        run: docker image prune -f
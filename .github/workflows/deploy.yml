name: T320 CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, linux, t320]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync to Stable directory
        run: |
          mkdir -p ~/stable/receipt-ai-app
          rsync -av --delete --exclude '.git' --exclude 'node_modules' ./ ~/stable/receipt-ai-app/

      - name: Create Stable .env
        run: |
          cd ~/stable/receipt-ai-app
          # 1. ルートの.env生成（Docker Composeがポートマッピングに使用）
          echo "UID=$(id -u)" > .env
          echo "GID=$(id -g)" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "COMPOSE_PROJECT_NAME=receipt-stable" >> .env
          echo "BACKEND_PORT=${{ secrets.STABLE_BACKEND_PORT }}" >> .env
          echo "FRONTEND_PORT=${{ secrets.STABLE_FRONTEND_PORT }}" >> .env
          echo "EXPO_PORT_1=${{ secrets.STABLE_EXPO_PORT_1 }}" >> .env
          echo "EXPO_PORT_2=${{ secrets.STABLE_EXPO_PORT_2 }}" >> .env
          echo "DB_PORT=${{ secrets.STABLE_DB_PORT }}" >> .env
          echo "REDIS_PORT=${{ secrets.STABLE_REDIS_PORT }}" >> .env
          echo "T320_IP=192.168.1.32" >> .env
          
          # 2. 各サービスへ展開
          cp .env ./frontend/.env
          cp .env ./backend/.env

          # 3. バックエンド用の設定をコンテナ内部通信用に最適化
          # Prisma用URLの追記
          echo "DATABASE_URL=postgresql://postgres:${{ secrets.DB_PASSWORD }}@db:5432/postgres?schema=public" >> ./backend/.env
          # Redis接続設定の上書き
          echo "REDIS_HOST=redis" >> ./backend/.env
          # ホスト公開用(6380)を、コンテナ内部の標準ポート(6379)へ置換
          sed -i 's/^REDIS_PORT=.*/REDIS_PORT=6379/' ./backend/.env

      - name: Install dependencies
        run: |
          cd ~/stable/receipt-ai-app/backend
          npm install
          cd ../frontend
          npm install

      - name: Docker Deploy
        run: |
          cd ~/stable/receipt-ai-app
          docker compose up -d --build
          
      - name: Cleanup
        run: docker image prune -f
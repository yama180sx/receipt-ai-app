name: Test

on:
  pull_request:
    branches: [develop]

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci-test-jwt-secret
          # app.integration.test.ts が createApp 経由で Prisma を import するため必須（DB 結合は skip）
          DATABASE_URL: postgresql://vitest:vitest@127.0.0.1:5432/vitest?schema=public

      - name: Verify OpenAPI route drift
        run: npm run check:openapi
        env:
          JWT_SECRET: ci-test-jwt-secret
          DATABASE_URL: postgresql://vitest:vitest@127.0.0.1:5432/vitest?schema=public

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify OpenAPI generated types
        run: npm run check:api

  backend-integration:
    name: Backend API integration (Postgres)
    runs-on: ubuntu-latest
    needs: [backend-unit]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cntadm
          POSTGRES_PASSWORD: ci-test-db-password
          POSTGRES_DB: receipt_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cntadm -d receipt_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://cntadm:ci-test-db-password@localhost:5432/receipt_db?schema=public
      JWT_SECRET: ci-test-jwt-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Run API integration tests
        run: npm run test:integration

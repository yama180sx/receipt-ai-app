services:
  # --- Backend (API Server & Prisma) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: receipt-${ENV_NAME}-backend
    user: "${UID}:${GID}"
    command: ${BACKEND_COMMAND}
    volumes:
      - ./backend:/app
      - /etc/localtime:/etc/localtime:ro
      - ./backend/uploads:/app/uploads
    ports:
      - "${BACKEND_PORT}:3000"
    stdin_open: true
    tty: true
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Tokyo
      - NODE_ENV=${NODE_ENV}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Frontend (運用検証・本番用: Nginx Hosting) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.web
      args:
        - EXPO_PUBLIC_API_URL=http://${T320_IP}:${BACKEND_PORT}/api
    container_name: receipt-${ENV_NAME}-frontend
    ports:
      - "${WEB_PORT}:80"
    restart: always
    environment:
      - TZ=Asia/Tokyo
    depends_on:
      - backend

  # --- Frontend (開発用: Expo Dev Server) ---
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: receipt-${ENV_NAME}-frontend-dev
    user: "${UID}:${GID}"
    command: npx expo start --web --port 8081 --host lan
    volumes:
      - ./frontend:/app
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${DEV_PORT}:8081"
      - "${EXPO_PORT_1:-19000}:19000"
      - "${EXPO_PORT_2:-19001}:19001"
    stdin_open: true
    tty: true
    env_file:
      - ./frontend/.env
    environment:
      - TZ=Asia/Tokyo
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${T320_IP}
      - EXPO_PACKAGER_PROXY_URL=${EXPO_PACKAGER_PROXY_URL}
    depends_on:
      - backend

  # --- Database (PostgreSQL 18) ---
  db:
    image: postgres:18
    container_name: receipt-${ENV_NAME}-db
    environment:
      - TZ=Asia/Tokyo
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis (BullMQ Backend) ---
  redis:
    image: redis:7-alpine
    container_name: receipt-${ENV_NAME}-redis
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - ./redisdata:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
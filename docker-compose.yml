services:
  app:
    build: .
    # user: "root" # 一時的にrootにして権限問題をクリアする
    # command: tail -f /dev/null
    # ユーザーを固定
    user: "${UID}:${GID}"
    # npxを排除し、package.jsonのscriptsを信頼する
    command: npm run dev
    volumes:
      - .:/app
      # - /app/node_modules
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8081:8081"
      - "3000:3000"
    stdin_open: true
    tty: true
    environment:
      - TZ=Asia/Tokyo
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    environment:
      - TZ=Asia/Tokyo
      - POSTGRES_USER=cntadm
      - POSTGRES_DB=receipt_db
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cntadm -d receipt_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
services:
  # --- Backend (API Server & Prisma) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "${UID}:${GID}"
    command: npm run dev
    volumes:
      - ./backend:/app
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Tokyo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Frontend (Expo / React Native) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    user: "${UID}:${GID}"
    command: npx expo start
    volumes:
      - ./frontend:/app
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    stdin_open: true
    tty: true
    env_file:
      - ./frontend/.env
    environment:
      - TZ=Asia/Tokyo
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.32 # T320の物理IPを指定

  # --- Database (PostgreSQL) ---
  db:
    image: postgres:latest
    environment:
      - TZ=Asia/Tokyo
      - POSTGRES_USER=cntadm
      - POSTGRES_DB=receipt_db
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cntadm -d receipt_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis (BullMQ Backend) ---
  redis:
    image: redis:7-alpine
    container_name: receipt-redis
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: